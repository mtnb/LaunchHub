name: LaunchHub

options:
  bundleIdPrefix: com.launchhub
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_STRICT_CONCURRENCY: complete

targets:

  LaunchHub:
    type: application
    platform: iOS
    sources:
      - path: Sources
    resources:
      - path: Resources
        optional: true
    info:
      path: Sources/App/Info.plist
      properties:
        CFBundleDisplayName: LaunchHub
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UIBackgroundModes:
          - audio
        NSBluetoothAlwaysUsageDescription: "LaunchHub uses Bluetooth to connect to your Launchpad via BLE-MIDI."
        NSLocalNetworkUsageDescription: "LaunchHub uses the local network to discover Launchpad devices via Wi-Fi MIDI."
    settings:
      base:
        INFOPLIST_FILE: Sources/App/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.launchhub.app
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
    entitlements:
      path: Sources/App/LaunchHub.entitlements
      properties:
        com.apple.security.app-sandbox: true
    dependencies: []
    scheme:
      testTargets:
        - LaunchHubTests
        - LaunchHubUITests

  LaunchHubTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/LaunchHubTests
    dependencies:
      - target: LaunchHub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.launchhub.app.tests

  LaunchHubUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: Tests/LaunchHubUITests
    dependencies:
      - target: LaunchHub
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.launchhub.app.uitests
